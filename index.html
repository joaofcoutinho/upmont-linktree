<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Upmont | Cadastro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="page-wrapper">

    <!-- Header / Branding -->
    <header class="brand-header">
      <div class="logo-wrap">
        <img src="logo.png" alt="Upmont" class="logo" onerror="this.style.display='none'" />
        <span class="brand-name">UPMONT</span>
      </div>
      <p class="brand-tagline">Preencha seus dados e entraremos em contato</p>
    </header>

    <!-- Card do Formulário -->
    <main class="card">
      <h1 class="card-title">Cadastro de Clientes</h1>

      <form id="cadastroForm" novalidate>

        <!-- Nome -->
        <div class="field-group">
          <label for="nome">Nome completo <span class="required">*</span></label>
          <input
            type="text"
            id="nome"
            name="nome"
            placeholder="Seu nome completo"
            autocomplete="name"
            required
          />
          <span class="error-msg" id="erro-nome"></span>
        </div>

        <!-- Telefone -->
        <div class="field-group">
          <label for="telefone">Telefone / WhatsApp <span class="required">*</span></label>
          <input
            type="tel"
            id="telefone"
            name="telefone"
            placeholder="(00) 00000-0000"
            autocomplete="tel"
            maxlength="15"
            required
          />
          <span class="error-msg" id="erro-telefone"></span>
        </div>

        <!-- E-mail -->
        <div class="field-group">
          <label for="email">E-mail <span class="required">*</span></label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="seu@email.com"
            autocomplete="email"
            required
          />
          <span class="error-msg" id="erro-email"></span>
        </div>

        <!-- Perfil -->
        <div class="field-group">
          <label>Perfil <span class="required">*</span></label>
          <div class="profile-options" role="radiogroup" aria-label="Selecione seu perfil">

            <label class="profile-card" for="perfil-corretor">
              <input type="radio" id="perfil-corretor" name="perfil" value="Corretor" />
              <div class="profile-inner">
                <span class="profile-icon">🤝</span>
                <span class="profile-label">Corretor</span>
                <span class="profile-desc">Quero parceria comercial</span>
              </div>
            </label>

            <label class="profile-card" for="perfil-investimento">
              <input type="radio" id="perfil-investimento" name="perfil" value="Investimento" />
              <div class="profile-inner">
                <span class="profile-icon">📈</span>
                <span class="profile-label">Investimento</span>
                <span class="profile-desc">Quero investir em imóveis</span>
              </div>
            </label>

            <label class="profile-card" for="perfil-moradia">
              <input type="radio" id="perfil-moradia" name="perfil" value="Moradia" />
              <div class="profile-inner">
                <span class="profile-icon">🏠</span>
                <span class="profile-label">Moradia</span>
                <span class="profile-desc">Quero comprar meu imóvel</span>
              </div>
            </label>

          </div>
          <span class="error-msg" id="erro-perfil"></span>
        </div>

        <button type="submit" class="btn-submit" id="btnSubmit">
          <span class="btn-text">Continuar no WhatsApp</span>
          <span class="btn-icon">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="20" height="20">
              <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
            </svg>
          </span>
        </button>

      </form>
    </main>

    <footer class="page-footer">
      <p>&copy; 2025 Upmont &mdash; Todos os direitos reservados</p>
    </footer>

  </div>

  <!-- ═══════════════════════════════════════════════
       RD STATION — Integração via Conversão REST
       Substitua "SEU_TOKEN_RD_STATION" pelo token
       público da sua conta no RD Station.
  ══════════════════════════════════════════════════ -->
  <script>
    // ─── Configuração RD Station ───────────────────
    const RD_TOKEN = "SEU_TOKEN_RD_STATION"; // ← substitua aqui
    const RD_CONVERSION_ID = "cadastro-upmont-linktree"; // identificador da conversão

    // ─── WhatsApp ──────────────────────────────────
    const WA_NUMBER = "5527992670152"; // 27 99267-0152

    // ──────────────────────────────────────────────
    // Máscara de telefone
    // ──────────────────────────────────────────────
    document.getElementById("telefone").addEventListener("input", function (e) {
      let v = e.target.value.replace(/\D/g, "");
      if (v.length > 11) v = v.slice(0, 11);
      if (v.length <= 10) {
        v = v.replace(/(\d{2})(\d{4})(\d{0,4})/, "($1) $2-$3");
      } else {
        v = v.replace(/(\d{2})(\d{5})(\d{0,4})/, "($1) $2-$3");
      }
      e.target.value = v;
    });

    // ──────────────────────────────────────────────
    // Realce visual do cartão de perfil selecionado
    // ──────────────────────────────────────────────
    document.querySelectorAll('input[name="perfil"]').forEach(function (radio) {
      radio.addEventListener("change", function () {
        document.querySelectorAll(".profile-card").forEach(function (c) {
          c.classList.remove("selected");
        });
        radio.closest(".profile-card").classList.add("selected");
        document.getElementById("erro-perfil").textContent = "";
      });
    });

    // ──────────────────────────────────────────────
    // Validação simples
    // ──────────────────────────────────────────────
    function validarFormulario(dados) {
      let ok = true;
      if (!dados.nome.trim()) {
        document.getElementById("erro-nome").textContent = "Informe seu nome.";
        ok = false;
      } else {
        document.getElementById("erro-nome").textContent = "";
      }

      const telLimpo = dados.telefone.replace(/\D/g, "");
      if (telLimpo.length < 10) {
        document.getElementById("erro-telefone").textContent = "Informe um telefone válido.";
        ok = false;
      } else {
        document.getElementById("erro-telefone").textContent = "";
      }

      const emailRe = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      if (!emailRe.test(dados.email)) {
        document.getElementById("erro-email").textContent = "Informe um e-mail válido.";
        ok = false;
      } else {
        document.getElementById("erro-email").textContent = "";
      }

      if (!dados.perfil) {
        document.getElementById("erro-perfil").textContent = "Selecione um perfil.";
        ok = false;
      } else {
        document.getElementById("erro-perfil").textContent = "";
      }
      return ok;
    }

    // ──────────────────────────────────────────────
    // Envio para RD Station (REST API v2)
    // ──────────────────────────────────────────────
    async function enviarRDStation(dados) {
      try {
        const payload = {
          event_type: "CONVERSION",
          event_family: "CDP",
          payload: {
            conversion_identifier: RD_CONVERSION_ID,
            name: dados.nome,
            email: dados.email,
            mobile_phone: dados.telefone,
            cf_perfil: dados.perfil,
            tags: ["linktree", "cadastro", dados.perfil.toLowerCase()],
            traffic_source: "linktree-upmont"
          }
        };

        await fetch(
          "https://api.rd.services/platform/events?api_key=" + RD_TOKEN,
          {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
          }
        );
      } catch (err) {
        // Não bloqueia o fluxo se o RD Station falhar
        console.warn("RD Station: falha no envio", err);
      }
    }

    // ──────────────────────────────────────────────
    // Redirecionar para WhatsApp
    // ──────────────────────────────────────────────
    function irParaWhatsApp(dados) {
      const msg =
        "*Cadastro de Clientes*\n" +
        "Nome: " + dados.nome + "\n" +
        "Telefone: " + dados.telefone + "\n" +
        "E-mail: " + dados.email + "\n" +
        "Perfil: " + dados.perfil;

      const url =
        "https://wa.me/" + WA_NUMBER + "?text=" + encodeURIComponent(msg);

      window.location.href = url;
    }

    // ──────────────────────────────────────────────
    // Submit
    // ──────────────────────────────────────────────
    document.getElementById("cadastroForm").addEventListener("submit", async function (e) {
      e.preventDefault();

      const dados = {
        nome: document.getElementById("nome").value.trim(),
        telefone: document.getElementById("telefone").value.trim(),
        email: document.getElementById("email").value.trim(),
        perfil: (document.querySelector('input[name="perfil"]:checked') || {}).value || ""
      };

      if (!validarFormulario(dados)) return;

      const btn = document.getElementById("btnSubmit");
      btn.disabled = true;
      btn.querySelector(".btn-text").textContent = "Aguarde…";

      // Envia ao RD Station (sem bloquear se falhar)
      await enviarRDStation(dados);

      // Redireciona para o WhatsApp
      irParaWhatsApp(dados);
    });
  </script>

</body>
</html>
